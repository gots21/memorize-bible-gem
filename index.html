<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성경 암송 Pro v6.3 (Direct DB Login)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { createClient } = supabase;

        // ⚠️ 네 Supabase URL과 API Key 입력
        const SUPABASE_URL = 'https://uxwxsryujlzrxpbolusd.supabase.co/rest/v1/';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4d3hzcnl1amx6cnhwYm9sdXNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDY1MzAsImV4cCI6MjA5MjQ4MjUzMH0.Fc1efM34jw4MhEjhlbfqFeO7X7xg4eMtDVO1U1qx5-Q';
        const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const BibleApp = () => {
            const [users, setUsers] = useState([]);
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('bible_current_user') || null);
            const [globalData, setGlobalData] = useState([]);
            const [userRecords, setUserRecords] = useState({});
            const [isDbReady, setIsDbReady] = useState(false);
            
            const [currentIdx, setCurrentIdx] = useState(() => Number(localStorage.getItem('last_category_idx')) || 0);
            const [view, setView] = useState('main'); 
            const [isTestModalOpen, setIsTestModalOpen] = useState(false);
            const [testMode, setTestMode] = useState('text');
            const [revealMap, setRevealMap] = useState({});
            
            const [loginInput, setLoginInput] = useState('');
            const [regModal, setRegModal] = useState(false);
            const [regForm, setRegForm] = useState({ id: '', name: '' });
            const [adminUserModal, setAdminUserModal] = useState(null);

            const fetchAllData = async () => {
                const { data: uData, error: uError } = await client.from('users').select('*');
                if (uError) {
                    console.error("DB Error:", uError);
                    alert("🚨 DB 연결 에러!\nURL이나 Key가 틀렸거나 RLS 설정 문제야.\n" + uError.message);
                    return;
                }
                
                let finalUsers = uData || [];
                if (finalUsers.length === 0) {
                    await client.from('users').insert({ id: 'gots21', name: '최고관리자', level: 'admin', status: 'active' });
                    const { data: newUData } = await client.from('users').select('*');
                    finalUsers = newUData || [];
                }
                setUsers(finalUsers);

                let { data: bData } = await client.from('bible_data').select('*').eq('id', 1).single();
                if (bData) setGlobalData(bData.content);

                const { data: rData } = await client.from('user_records').select('*');
                if (rData) {
                    const map = {};
                    rData.forEach(r => map[r.user_id] = r.record_data);
                    setUserRecords(map);
                }

                setIsDbReady(true);
            };

            useEffect(() => { fetchAllData(); }, []);
            useEffect(() => { localStorage.setItem('last_category_idx', currentIdx); }, [currentIdx]);
            useEffect(() => { 
                if(currentUser) localStorage.setItem('bible_current_user', currentUser);
                else localStorage.removeItem('bible_current_user');
            }, [currentUser]);

            const currentUserObj = useMemo(() => users.find(u => u.id === currentUser), [currentUser, users]);
            const isAdmin = currentUserObj?.level === 'admin';

            // 💡 [수정됨] 로그인 시 DB를 직접 조회해서 확인하는 로직
            const handleLogin = async () => {
                const id = loginInput.trim().toLowerCase();
                if (!id) return;

                if (!isDbReady) return alert("DB 연결을 확인 중이야. 잠시만!");

                // 화면에 띄워진 데이터 말고, DB에 직접 물어봄
                const { data: user, error } = await client.from('users').select('*').eq('id', id).single();

                if (error || !user) {
                    return alert(`DB에 '${id}' 아이디가 없어. 계정 생성을 먼저 해줘!\n(상세: ${error?.message || 'Not Found'})`);
                }

                if (user.status === 'pending') {
                    return alert("가입은 되어 있는데, 관리자(gots21) 승인을 기다리는 중이야!");
                }

                setCurrentUser(id);
                setView('main');
            };

            const submitRegistration = async () => {
                const id = regForm.id.trim().toLowerCase();
                if (!/^[a-z0-9]{1,10}$/.test(id)) return alert("ID는 영소문자/숫자 10자 이내.");
                if (!regForm.name.trim()) return alert("이름을 입력해줘.");
                
                // 가입 전 DB 체크
                const { data: exist } = await client.from('users').select('id').eq('id', id).single();
                if (exist) return alert("이미 존재하는 ID야.");
                
                const { error } = await client.from('users').insert({ id, name: regForm.name.trim(), level: 'user', status: 'pending' });
                if (!error) { 
                    alert("신청 완료! 관리자 승인 후 로그인할 수 있어."); 
                    setRegModal(false); 
                    fetchAllData(); 
                } else {
                    alert("가입 오류: " + error.message);
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setLoginInput('');
                setView('main');
            };

            const handleStatusChange = async (vId, status) => {
                const newRecord = { ...(userRecords[currentUser] || {}), [vId]: status };
                setUserRecords({ ...userRecords, [currentUser]: newRecord }); 
                await client.from('user_records').upsert({ user_id: currentUser, record_data: newRecord });
            };

            const getVerseStatus = (vId) => userRecords[currentUser]?.[vId] || 'none';

            const progress = useMemo(() => {
                if (!globalData[currentIdx]?.verses) return 0;
                const verses = globalData[currentIdx].verses;
                const done = verses.filter(v => getVerseStatus(v.id) === 'done').length;
                return Math.round((done / verses.length) * 100);
            }, [globalData, currentIdx, userRecords, currentUser]);

            const resetAllRecords = async () => {
                if(confirm("경고: 모든 사용자의 암송 기록을 날려버릴까?")) {
                    await client.from('user_records').delete().neq('user_id', '');
                    fetchAllData();
                    alert("전체 기록 초기화 완료!");
                }
            };

            const resetMyRecord = async () => {
                if(confirm("내 암송 기록을 초기화할까? (복구 불가)")) {
                    await client.from('user_records').delete().eq('user_id', currentUser);
                    fetchAllData();
                    alert("내 기록 초기화 완료!");
                }
            };

            const approveUser = async (id) => {
                await client.from('users').update({ status: 'active' }).eq('id', id);
                fetchAllData();
            };

            const saveAdminUserModal = async () => {
                const { isNew, id, name, level } = adminUserModal;
                const cleanId = id.trim().toLowerCase();
                const cleanName = name.trim();

                if (!/^[a-z0-9]{1,10}$/.test(cleanId)) return alert("ID는 영소문자/숫자 10자 이내.");
                if (!cleanName) return alert("이름을 입력해.");

                if (isNew) {
                    const { data: exist } = await client.from('users').select('id').eq('id', cleanId).single();
                    if (exist) return alert("이미 존재하는 ID야.");
                    await client.from('users').insert({ id: cleanId, name: cleanName, level, status: 'active' });
                } else {
                    if (cleanId === 'gots21' && level !== 'admin') return alert("창조주의 권한은 강등할 수 없어.");
                    await client.from('users').update({ name: cleanName, level }).eq('id', cleanId);
                }
                setAdminUserModal(null);
                fetchAllData();
            };

            const deleteUser = async (targetId) => {
                if(targetId === 'gots21') return alert("절대 권력자 'gots21'은 삭제 불가!");
                if(targetId === currentUser) return alert("자기 자신은 삭제할 수 없어.");
                if(confirm(`사용자 '${targetId}'를 삭제할까?`)) {
                    await client.from('users').delete().eq('id', targetId);
                    fetchAllData();
                }
            };

            const updateGlobalDataDB = async (newData) => {
                setGlobalData(newData);
                await client.from('bible_data').upsert({ id: 1, content: newData });
            };

            const addCategory = () => {
                const title = prompt("새로운 주제 이름을 입력해:");
                if (title) updateGlobalDataDB([...globalData, { category: title, verses: [] }]);
            };
            const editCategory = (idx) => {
                const newTitle = prompt("수정할 주제 이름을 입력해:", globalData[idx].category);
                if (newTitle) {
                    const newData = [...globalData];
                    newData[idx].category = newTitle;
                    updateGlobalDataDB(newData);
                }
            };
            const deleteCategory = (idx) => {
                if (confirm(`'${globalData[idx].category}' 주제를 삭제할까?`)) {
                    const newData = globalData.filter((_, i) => i !== idx);
                    if (currentIdx >= newData.length - 1) setCurrentIdx(0);
                    updateGlobalDataDB(newData);
                }
            };
            const addVerse = (catIdx) => {
                const ref = prompt("장절 입력:"); if (!ref) return;
                const text = prompt("말씀 입력:"); if (!text) return;
                const newData = [...globalData];
                newData[catIdx].verses.push({ id: `v_${Date.now()}`, ref, text });
                updateGlobalDataDB(newData);
            };
            const editVerse = (catIdx, verseId) => {
                const newData = [...globalData];
                const verse = newData[catIdx].verses.find(v => v.id === verseId);
                const ref = prompt("장절 수정:", verse.ref); if (!ref) return;
                const text = prompt("말씀 내용 수정:", verse.text); if (!text) return;
                verse.ref = ref; verse.text = text;
                updateGlobalDataDB(newData);
            };
            const deleteVerse = (catIdx, verseId) => {
                if (confirm("이 말씀을 삭제할까?")) {
                    const newData = [...globalData];
                    newData[catIdx].verses = newData[catIdx].verses.filter(v => v.id !== verseId);
                    updateGlobalDataDB(newData);
                }
            };

            // --- UI 렌더링 ---
            if (!currentUser) return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-5 bg-gray-50 relative">
                    <div className="w-full bg-white p-8 rounded-3xl shadow-lg border border-gray-100 text-center">
                        <h1 className="text-4xl font-black italic tracking-tighter text-blue-600 mb-2">BIBLE.</h1>
                        <p className="text-gray-400 font-bold mb-8">Memorize System (Cloud)</p>
                        
                        <div className="text-left mb-6">
                            <label className="text-xs font-bold text-gray-500 ml-1">USER ID (소문자/숫자만)</label>
                            <input type="text" value={loginInput} onChange={e => setLoginInput(e.target.value.toLowerCase())} placeholder="아이디 입력" maxLength={10} className="w-full mt-1 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold focus:border-blue-500 outline-none" />
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleLogin} className={`flex-1 py-4 text-white rounded-2xl font-bold ${isDbReady ? 'bg-gray-900' : 'bg-gray-400 cursor-not-allowed'}`}>
                                {isDbReady ? '로그인' : 'DB 연결중...'}
                            </button>
                            <button onClick={() => isDbReady ? setRegModal(true) : alert("DB 연결중이야!")} className="flex-1 py-4 bg-blue-100 text-blue-700 rounded-2xl font-bold">계정 생성</button>
                        </div>
                    </div>

                    {regModal && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                                <h3 className="text-xl font-black mb-6 text-center text-blue-600">계정 생성 신청</h3>
                                <div className="space-y-4 mb-8">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 ml-1">희망 ID (영소문자/숫자 10자 이내)</label>
                                        <input type="text" value={regForm.id} onChange={e => setRegForm({...regForm, id: e.target.value.toLowerCase()})} maxLength={10} className="w-full p-3 bg-gray-50 border-2 rounded-xl mt-1 outline-none focus:border-blue-500"/>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 ml-1">이름 (표시용)</label>
                                        <input type="text" value={regForm.name} onChange={e => setRegForm({...regForm, name: e.target.value})} className="w-full p-3 bg-gray-50 border-2 rounded-xl mt-1 outline-none focus:border-blue-500"/>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={submitRegistration} className="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl">신청하기</button>
                                    <button onClick={() => setRegModal(false)} className="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl">취소</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'settings') return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-50 p-5 pb-24 relative">
                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('main')} className="text-gray-400 font-bold">← 돌아가기</button>
                        <h2 className="text-2xl font-black">SETTINGS</h2>
                    </header>

                    <div className="mb-8 p-5 bg-white rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                        <div>
                            <p className="text-xs text-gray-400 font-bold">접속 정보</p>
                            <p className="font-black text-lg text-blue-600">{currentUserObj?.name} <span className="text-sm text-gray-400 font-normal">({currentUser})</span></p>
                            <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded inline-block mt-1">{isAdmin ? 'Admin' : 'User'}</span>
                        </div>
                        <button onClick={handleLogout} className="text-sm font-bold text-gray-500 underline">로그아웃</button>
                    </div>

                    <button onClick={resetMyRecord} className="w-full py-4 bg-white text-red-500 rounded-2xl font-bold mb-8 shadow-sm border border-red-100">내 암송 기록 초기화</button>

                    {isAdmin && (
                        <div className="space-y-8 animate-in fade-in duration-300">
                            <div className="pt-6 border-t-2 border-dashed border-gray-200">
                                <h3 className="font-black text-xl text-blue-600 mb-4">👑 ADMIN 영역</h3>
                                <button onClick={resetAllRecords} className="w-full py-3 bg-red-100 text-red-600 rounded-xl font-bold mb-4">🚨 전체 사용자 기록 리셋</button>
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-gray-800">사용자 관리</h4>
                                    <button onClick={() => setAdminUserModal({ isNew: true, id: '', name: '', level: 'user' })} className="text-xs bg-gray-900 text-white px-3 py-1 rounded">+ 추가</button>
                                </div>
                                
                                {users.filter(u => u.status === 'pending').map(u => (
                                    <div key={u.id} className="flex justify-between items-center p-3 bg-yellow-50 rounded-xl mb-2 border border-yellow-100">
                                        <div>
                                            <span className="font-bold text-sm">{u.name} <span className="text-xs text-gray-500">({u.id})</span></span>
                                            <span className="text-[10px] ml-2 bg-yellow-400 text-white px-2 py-0.5 rounded">승인대기</span>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => approveUser(u.id)} className="text-[10px] bg-green-500 text-white px-3 py-1 rounded font-bold">승인</button>
                                            <button onClick={() => deleteUser(u.id)} className="text-[10px] bg-red-100 text-red-500 px-2 py-1 rounded">거절(삭제)</button>
                                        </div>
                                    </div>
                                ))}

                                {users.filter(u => u.status !== 'pending').map(u => (
                                    <div key={u.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-xl mb-2">
                                        <div>
                                            <span className="font-bold text-sm">{u.name} <span className="text-xs text-gray-400">({u.id})</span></span>
                                            <span className={`text-[10px] ml-2 px-2 py-0.5 rounded ${u.level === 'admin' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>{u.level}</span>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => setAdminUserModal({ isNew: false, ...u })} className="text-[10px] bg-gray-200 px-2 py-1 rounded">수정</button>
                                            <button onClick={() => deleteUser(u.id)} className="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded">삭제</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-gray-800">주제 및 구절 관리</h4>
                                    <button onClick={addCategory} className="text-xs bg-blue-600 text-white px-3 py-1 rounded">+ 새 주제</button>
                                </div>
                                <div className="space-y-4">
                                    {globalData.map((cat, cIdx) => (
                                        <div key={cIdx} className="border border-gray-100 rounded-xl p-3">
                                            <div className="flex justify-between items-center mb-2 pb-2 border-b border-gray-50">
                                                <span className="font-bold text-sm text-blue-600">{cat.category}</span>
                                                <div className="flex gap-1">
                                                    <button onClick={() => editCategory(cIdx)} className="text-[10px] text-gray-400">수정</button>
                                                    <button onClick={() => deleteCategory(cIdx)} className="text-[10px] text-red-400">삭제</button>
                                                </div>
                                            </div>
                                            <div className="space-y-2 mb-2">
                                                {cat.verses.map(v => (
                                                    <div key={v.id} className="flex justify-between text-xs">
                                                        <span className="text-gray-500">{v.ref}</span>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => editVerse(cIdx, v.id)} className="text-[10px] text-blue-400">수정</button>
                                                            <button onClick={() => deleteVerse(cIdx, v.id)} className="text-[10px] text-red-400">삭제</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => addVerse(cIdx)} className="w-full py-1 bg-gray-50 text-[10px] text-gray-400 rounded border border-dashed border-gray-200">+ 말씀 추가</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {adminUserModal && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                                <h3 className="text-xl font-black mb-6">{adminUserModal.isNew ? '사용자 추가' : '사용자 수정'}</h3>
                                <div className="space-y-4 mb-8">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500">ID (수정불가)</label>
                                        <input type="text" value={adminUserModal.id} disabled={!adminUserModal.isNew} onChange={e => setAdminUserModal({...adminUserModal, id: e.target.value.toLowerCase()})} maxLength={10} className="w-full p-3 bg-gray-50 border-2 rounded-xl mt-1 outline-none disabled:opacity-50"/>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500">이름</label>
                                        <input type="text" value={adminUserModal.name} onChange={e => setAdminUserModal({...adminUserModal, name: e.target.value})} className="w-full p-3 bg-gray-50 border-2 rounded-xl mt-1 outline-none focus:border-blue-500"/>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500">권한 레벨</label>
                                        <select value={adminUserModal.level} onChange={e => setAdminUserModal({...adminUserModal, level: e.target.value})} className="w-full p-3 bg-gray-50 border-2 rounded-xl mt-1 outline-none focus:border-blue-500">
                                            <option value="user">User</option>
                                            <option value="admin">Admin</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={saveAdminUserModal} className="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl">저장</button>
                                    <button onClick={() => setAdminUserModal(null)} className="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl">취소</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            const TestModal = () => (
                <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl">
                        <h3 className="text-lg font-bold mb-4 text-center">테스트 방식 선택</h3>
                        <div className="space-y-3">
                            <button onClick={() => { setTestMode('text'); setView('test'); setIsTestModalOpen(false); }} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">말씀 암송</button>
                            <button onClick={() => { setTestMode('ref'); setView('test'); setIsTestModalOpen(false); }} className="w-full py-3 bg-gray-100 text-gray-800 rounded-xl font-bold border">장절 맞추기</button>
                            <button onClick={() => setIsTestModalOpen(false)} className="w-full py-2 text-gray-400 text-sm">취소</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'test') return (
                <div className="max-w-md mx-auto min-h-screen bg-white p-5 pb-24">
                    <button onClick={() => { setView('main'); setRevealMap({}); }} className="mb-6 text-gray-400 font-medium">← 학습으로 돌아가기</button>
                    <header className="mb-8">
                        <span className="text-xs font-bold text-blue-500 uppercase tracking-widest">{testMode === 'text' ? 'Word Memory' : 'Reference Match'}</span>
                        <h2 className="text-2xl font-black">[{globalData[currentIdx]?.category}]</h2>
                    </header>
                    
                    {globalData[currentIdx]?.verses.map(v => (
                        <div key={v.id} className="mb-10 animate-in fade-in duration-500">
                            <div className="p-6 bg-gray-50 rounded-2xl mb-4 border border-gray-100">
                                {testMode === 'text' ? (
                                    <div className="text-center">
                                        <p className="text-blue-600 font-bold text-xl mb-4">{v.ref}</p>
                                        {!revealMap[v.id] && (
                                            <p className="text-gray-400 font-medium text-lg mb-2">{v.text.split(' ').slice(0, 2).join(' ')} <span className="opacity-40 tracking-widest">...</span></p>
                                        )}
                                        <div className={`transition-all duration-300 ${revealMap[v.id] ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                                            <p className="text-gray-800 leading-relaxed text-lg italic">"{v.text}"</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center">
                                        <p className="text-gray-800 leading-relaxed text-lg mb-4">"{v.text}"</p>
                                        <div className={`transition-all duration-300 ${revealMap[v.id] ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                                            <p className="text-blue-600 font-bold text-xl">{v.ref}</p>
                                        </div>
                                    </div>
                                )}
                                <button onClick={() => setRevealMap(prev => ({...prev, [v.id]: !prev[v.id]}))} className="mt-4 w-full text-xs text-gray-400 underline decoration-dotted">
                                    {revealMap[v.id] ? '숨기기' : '정답 확인'}
                                </button>
                            </div>
                            <div className="flex gap-2">
                                {['done', 'partial', 'none'].map(s => {
                                    const currStatus = getVerseStatus(v.id);
                                    return (
                                        <button key={s} onClick={() => handleStatusChange(v.id, s)} className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all ${currStatus === s ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-gray-100 text-gray-400'}`}>
                                            {s === 'done' ? '완성' : s === 'partial' ? '불완전' : '모름'}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-5 pb-24">
                    {isTestModalOpen && <TestModal />}
                    
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-black tracking-tighter italic">BIBLE.</h1>
                            <p className="text-xs font-bold text-gray-400 mt-1">Hello, <span className="text-blue-500">{currentUserObj?.name}</span></p>
                        </div>
                        <button onClick={() => setView('settings')} className="text-2xl opacity-50 hover:opacity-100 transition-opacity">⚙️</button>
                    </header>

                    {globalData.length > 0 ? (
                        <>
                            <div className="mb-8">
                                <p className="text-xs font-bold text-gray-400 mb-2 ml-1">SELECT CATEGORY</p>
                                <select value={currentIdx} onChange={(e) => setCurrentIdx(Number(e.target.value))} className="w-full p-4 bg-white border-2 border-gray-100 rounded-2xl font-bold text-gray-700 shadow-sm focus:border-blue-500 outline-none transition-all">
                                    {globalData.map((cat, i) => <option key={i} value={i}>{cat.category}</option>)}
                                </select>
                            </div>

                            <div className="mb-10 bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                                <div className="flex justify-between items-end mb-3">
                                    <span className="font-black text-2xl text-blue-600">{progress}%</span>
                                    <span className="text-xs font-bold text-gray-400">MEMORIZED</span>
                                </div>
                                <div className="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                                    <div className="bg-blue-500 h-full transition-all duration-1000 ease-out" style={{width: `${progress}%`}}></div>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {globalData[currentIdx]?.verses.map(v => {
                                    const currStatus = getVerseStatus(v.id);
                                    return (
                                        <div key={v.id} className="p-5 bg-white rounded-2xl border border-gray-100 shadow-sm transition-transform active:scale-[0.98]">
                                            <div className="flex justify-between items-start mb-3">
                                                <span className="text-sm font-black text-blue-500">{v.ref}</span>
                                                <div className={`w-2 h-2 rounded-full ${currStatus === 'done' ? 'bg-green-400' : currStatus === 'partial' ? 'bg-yellow-400' : 'bg-red-400'}`}></div>
                                            </div>
                                            <p className="text-gray-700 leading-relaxed font-medium">"{v.text}"</p>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-5">
                                <button onClick={() => setIsTestModalOpen(true)} className="w-full py-4 bg-gray-900 text-white rounded-2xl font-black text-lg shadow-xl hover:bg-black transition-all">TEST NOW</button>
                            </div>
                        </>
                    ) : (
                        <div className="text-center py-20 text-gray-400">
                            <p>주제가 하나도 없어.</p>
                            <p className="text-sm mt-2">관리자 설정에서 새 주제를 추가해봐!</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BibleApp />);
    </script>
</body>
</html>
